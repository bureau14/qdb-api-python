agents:
  queue: "default-{queue}"

retry:
  automatic:
      limit: 3

label: "{name} ({slug})"
key: "build-{slug}"

commands:
  - echo \"+++ Start Services\"
  - scripts/tests/setup/start-services.sh
  - echo \"+++ Run Tests\"
  - scripts/teamcity/20.test.sh
  - echo \"+++ Stop Services\"
  - scripts/tests/setup/stop-services.sh
  - echo \"+++ Run build\"
  - scripts/teamcity/10.build.sh

plugins:
  - bureau14/qdb-artifacts#artifact-dependency:
      download:
        project_id: "quasardb"
        output-dir: "qdb"
        extract: true
        clean: true
        files:
          - "*-c-api.tar.zst!*"
          - "*-server.tar.zst!*"
          - "*-utils.tar.zst!*"
      upload:
        files: "dist/*"
      promote: {}