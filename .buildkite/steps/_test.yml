agents:
  queue: "default-{queue}"

label: "Test ({slug})"
key: "test-{slug}"

commands:
  - echo \"+++ Start Services\"
  - bash scripts/tests/setup/start-services.sh
  - echo \"+++ Run Tests\"
  - bash scripts/teamcity/20.test.sh
  - echo \"+++ Stop Services\"
  - bash scripts/tests/setup/stop-services.sh
  - echo \"+++ Run build\"
  - bash scripts/teamcity/10.build.sh

plugins:
  - bureau14/qdb-artifacts#artifact-dependency:
      download:
        project_id: "quasardb"
        variant: "{dependency_slug}"
        git_ref: "{ref}"
        output-dir: "qdb"
        extract: true
        clean: true
        files:
          - "*-c-api.tar.zst!*"
          - "*-server.tar.zst!*"
          - "*-utils.tar.zst!*"
      upload:
        files: "dist/*"
      promote: {}